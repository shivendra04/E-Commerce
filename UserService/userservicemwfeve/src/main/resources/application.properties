spring.jpa.hibernate.ddl-auto=validate
# Same RDS host as product service, but use a separate database for user service (each microservice = own DB).
# createDatabaseIfNotExist=true creates userservicedb on first connect if missing (user must have CREATE privilege).
spring.datasource.url= ${USER_SERVICE_DATABASE_URL}

# Use explicit DB user (not OS user). If you see 'DELL' in errors, set SPRING_DATASOURCE_USERNAME in run config.
spring.datasource.username=${USER_SERVICE_DATABASE_USERNAME}
spring.datasource.password=${USER_SERVICE_DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.show-sql: true
server.port=8181
# JWT signing key (min 256 bits for HS256). Override in production.
jwt.secret=userservicemwfeve-secret-key-at-least-256-bits-for-hs256
